services:
  app:
    container_name: iris-system-detector-ia
    build: .
    ports:
      - "${PORT:-8000}:8000"
    env_file:
      - .env
    volumes:
      - ./src/storage:/app/src/storage
      - ./static:/app/static
      - ./templates:/app/templates
    restart: unless-stopped
    user: "1000:1000"
    deploy:
      resources:
        limits:
          memory: 3G
          cpus: "3.0"
        reservations:
          memory: 512M
          cpus: "0.5"
