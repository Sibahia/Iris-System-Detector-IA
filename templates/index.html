<!DOCTYPE html>
<html class="dark" lang="es" style="">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>VideoAI - Navigation</title>
    <link rel="stylesheet" href="static/css/index.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap"
        rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet">
</head>
<body
    class="bg-background text-on-background font-body-md min-h-screen overflow-x-hidden selection:bg-primary-container selection:text-on-primary-container relative">

    <main class="relative z-10 min-h-screen flex flex-col items-center justify-center p-6 md:p-12">
        <div class="max-w-5xl w-full mx-auto">

            <div class="text-center mb-16 animate-fade-in-up">
                <h1
                    class="font-display-lg text-display-lg text-on-surface mb-4 drop-shadow-[0_0_15px_rgba(255,255,255,0.4)] tracking-tight">
                    AI Tracker</h1>
                <p class="font-body-lg text-body-lg text-on-surface-variant max-w-xl mx-auto">Selecciona una opción para
                    comenzar con el análisis y detección</p>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-6 gap-6">

                <a class="glass-panel rounded-[24px] p-8 md:col-span-2 flex flex-col items-center justify-center text-center group hover:-translate-y-2 transition-all duration-300 animate-fade-in-up delay-100 relative overflow-hidden"
                    href="/video-analysis">
                    <div
                        class="absolute inset-0 bg-gradient-to-br from-primary/10 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-500">
                    </div>
                    <div
                        class="w-20 h-20 rounded-full bg-primary/20 flex items-center justify-center mb-6 group-hover:scale-110 transition-transform duration-300 border border-primary/30 relative z-10">
                        <span class="material-symbols-outlined text-primary text-4xl"
                            style="font-variation-settings: &quot;FILL&quot; 1;">movie</span>
                    </div>
                    <h3 class="font-headline-md text-headline-md text-on-surface mb-2 relative z-10">Analizar Video</h3>
                </a>

                <a class="glass-panel rounded-[24px] p-8 md:col-span-2 flex flex-col items-center justify-center text-center group hover:-translate-y-2 transition-all duration-300 animate-fade-in-up delay-200 relative overflow-hidden"
                    href="/stream-analysis">
                    <div
                        class="absolute inset-0 bg-gradient-to-b from-primary/10 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-500">
                    </div>
                    <div
                        class="w-20 h-20 rounded-full bg-primary/20 flex items-center justify-center mb-6 group-hover:scale-110 transition-transform duration-300 border border-primary/30 relative z-10">
                        <span class="material-symbols-outlined text-primary text-4xl"
                            style="font-variation-settings: &quot;FILL&quot; 1;">sensors</span>
                        <span class="absolute top-2 right-2 flex h-3 w-3">
                            <span
                                class="animate-ping absolute inline-flex h-full w-full rounded-full bg-primary opacity-75"></span>
                            <span class="relative inline-flex rounded-full h-3 w-3 bg-primary"></span>
                        </span>
                        <span
                            class="absolute -top-1 -right-4 px-2 py-0.5 rounded-full text-[10px] font-bold bg-primary text-on-primary border border-primary/30 shadow-lg z-20">BETA</span>
                    </div>
                    <h3 class="font-headline-md text-headline-md text-on-surface mb-2 relative z-10">Analizar Stream
                    </h3>
                </a>

                <a class="glass-panel rounded-[24px] p-8 md:col-span-2 flex flex-col items-center justify-center text-center group hover:-translate-y-2 transition-all duration-300 animate-fade-in-up delay-300 relative overflow-hidden"
                    href="/image-analysis">
                    <div
                        class="absolute inset-0 bg-gradient-to-bl from-primary/10 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-500">
                    </div>
                    <div
                        class="w-20 h-20 rounded-full bg-primary/20 flex items-center justify-center mb-6 group-hover:scale-110 transition-transform duration-300 border border-primary/30 relative z-10">
                        <span class="material-symbols-outlined text-primary text-4xl">image</span>
                    </div>
                    <h3 class="font-headline-md text-headline-md text-on-surface mb-2 relative z-10">Analiza Imagen</h3>
                </a>

                <a class="glass-panel rounded-[24px] p-8 md:col-span-3 flex flex-col items-center justify-center text-center group hover:-translate-y-2 transition-all duration-300 animate-fade-in-up delay-400 relative overflow-hidden"
                    href="/logs">
                    <div
                        class="absolute inset-0 bg-white/5 opacity-0 group-hover:opacity-100 transition-opacity duration-500">
                    </div>
                    <div
                        class="w-20 h-20 rounded-full bg-surface-variant flex items-center justify-center mb-6 group-hover:scale-110 transition-transform duration-300 border border-white/10 relative z-10">
                        <span class="material-symbols-outlined text-on-surface text-4xl">history</span>
                    </div>
                    <h3 class="font-headline-md text-headline-md text-on-surface mb-2 relative z-10">Historial</h3>
                </a>

                <a class="glass-panel rounded-[24px] p-8 md:col-span-3 flex flex-col items-center justify-center text-center group hover:-translate-y-2 transition-all duration-300 animate-fade-in-up delay-400 relative overflow-hidden"
                    href="/contributors">
                    <div
                        class="absolute inset-0 bg-white/5 opacity-0 group-hover:opacity-100 transition-opacity duration-500">
                    </div>
                    <div
                        class="w-20 h-20 rounded-full bg-surface-variant flex items-center justify-center mb-6 group-hover:scale-110 transition-transform duration-300 border border-white/10 relative z-10">
                        <span class="material-symbols-outlined text-on-surface text-4xl">groups</span>
                    </div>
                    <h3 class="font-headline-md text-headline-md text-on-surface mb-2 relative z-10">Contribuidores</h3>
                </a>
            </div>
        </div>
    </main>

    <script src="static/js/index.js"></script>
</body>
</html>
