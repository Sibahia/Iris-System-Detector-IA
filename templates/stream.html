<!DOCTYPE html>
<html class="dark" lang="es">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>{{SITE_TITLE}} - Monitoreo en Tiempo Real</title>
    <link rel="stylesheet" href="static/css/tailwind.css">
    <link href="/static/fonts/fonts.css" rel="stylesheet">
</head>
<body class="bg-background flex flex-col min-h-screen selection:bg-primary-container/30">
    <header class="sticky top-0 w-full h-20 bg-white/4 backdrop-blur-[20px] border-b border-white/10 z-50 flex justify-between items-center px-grid-margin shadow-2xl">
        <div class="flex items-center gap-2">
            <span class="material-symbols-outlined text-primary text-3xl">videocam</span>
            <h1 class="font-headline-md text-headline-md font-bold text-primary">{{SITE_TITLE}}</h1>
        </div>
        <a class="bg-primary-container text-on-primary-container px-8 py-2.5 rounded-full font-bold flex items-center gap-2" href="/">
            <span class="material-symbols-outlined text-sm">home</span> Inicio
        </a>
    </header>

    <main class="flex-1 relative z-10 pt-32 pb-20 px-grid-margin max-w-7xl mx-auto">
        <div class="grid grid-cols-12 gap-stack-lg">
            <section class="col-span-12 glass-card p-card-padding">
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
                    <div>
                        <label class="block text-xs font-semibold text-on-surface-variant uppercase tracking-wider mb-2">Fuente de Video</label>
                        <div class="relative">
                            <select id="sourceSelect" class="input-field w-full rounded-xl py-2 pl-4 pr-10 appearance-none text-sm cursor-pointer">
                                <option value="webcam">Webcam Local</option>
                                <option value="rtsp">Stream RTMP / RTSP</option>
                                <option value="http">Video URL</option>
                            </select>
                            <span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none text-on-surface-variant text-sm">expand_more</span>
                        </div>
                    </div>

                    <div>
                        <div id="cameraSelectContainer">
                            <label class="block text-xs font-semibold text-on-surface-variant uppercase tracking-wider mb-2">Cámara</label>
                            <div class="relative">
                                <select id="cameraSelect" class="input-field w-full rounded-xl py-2 pl-4 pr-10 appearance-none text-sm cursor-pointer">
                                    <option value="0">Cámara 0 (Default)</option>
                                    <option value="1">Cámara 1 (Externa)</option>
                                </select>
                                <span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none text-on-surface-variant text-sm">expand_more</span>
                            </div>
                        </div>
                        <div id="urlInputContainer" class="hidden">
                            <label class="block text-xs font-semibold text-on-surface-variant uppercase tracking-wider mb-2">URL del Stream</label>
                            <input type="text" id="streamUrlInput" placeholder="rtsp://usuario:pass@ip:port/stream" class="input-field w-full rounded-xl py-2 pl-4 pr-4 text-sm">
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-semibold text-on-surface-variant uppercase tracking-wider mb-2">Modelo de IA</label>
                        <div class="relative">
                            <select id="model-select" class="input-field w-full rounded-xl py-2 pl-4 pr-10 appearance-none text-sm cursor-pointer">
                            </select>
                            <span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none text-on-surface-variant text-sm">expand_more</span>
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-semibold text-on-surface-variant uppercase tracking-wider mb-2">Multitud</label>
                        <div class="relative">
                            <select id="sensitivitySelect" class="input-field w-full rounded-xl py-2 pl-4 pr-10 appearance-none text-sm cursor-pointer">
                                <option value="3">3+ personas</option>
                                <option value="2">2+ personas</option>
                                <option value="5">5+ personas</option>
                            </select>
                            <span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none text-on-surface-variant text-sm">expand_more</span>
                        </div>
                    </div>
                </div>

                <div class="flex items-center gap-4 mb-6">
                    <label class="text-xs font-semibold text-on-surface-variant uppercase tracking-wider whitespace-nowrap">Confidencia</label>
                    <span id="confidence-value" class="text-primary font-mono text-sm font-bold">0.45</span>
                    <input id="confidence-slider" type="range" min="0.1" max="0.8" step="0.05" value="0.45"
                        class="w-full h-1.5 bg-white/10 rounded-full appearance-none cursor-pointer accent-primary-container focus:outline-none">
                </div>

                <div class="flex justify-center">
                    <button id="startMonitoring" class="w-full md:w-auto bg-primary text-on-primary-fixed font-semibold py-3 px-8 rounded-xl flex items-center justify-center gap-2 transition-colors shadow-lg shadow-primary-container/20">
                        <span class="material-symbols-outlined">play_arrow</span>
                        Iniciar Monitoreo
                    </button>
                </div>
            </section>

            <section class="col-span-12 relative aspect-video glass-card overflow-hidden">
                <div class="absolute inset-0 z-20 p-stack-md flex flex-col justify-between">
                    <div class="flex justify-between items-start">
                        <div class="flex items-center gap-2 bg-black/40 backdrop-blur-md px-3 py-1.5 rounded-full border border-white/10">
                            <span class="w-2 h-2 rounded-full bg-red-500" id="statusIndicator"></span>
                            <span class="font-label-sm text-label-sm uppercase" id="statusLabel">● Desconectado</span>
                        </div>
                    </div>
                </div>

                <div class="absolute inset-0 bg-[#0c0e10] flex items-center justify-center flex-col gap-4 text-center">
                    <div id="loadingIcon">
                        <span class="material-symbols-outlined text-[64px] animate-pulse text-on-surface/20">videocam_off</span>
                        <p class="text-on-surface/40" id="loadingText">Esperando señal de video...</p>
                    </div>
                    <div class="hidden absolute inset-0" id="streamCanvas"></div>
                </div>
            </section>

            <section class="col-span-12 grid grid-cols-2 md:grid-cols-4 gap-stack-lg">
                <div class="glass-card p-6 flex flex-col items-center justify-center text-center">
                    <span class="font-label-sm uppercase text-on-surface/50">FPS</span>
                    <span class="font-headline-md text-headline-md text-on-surface" id="metric-fps">0</span>
                </div>
                <div class="glass-card p-6 flex flex-col items-center justify-center text-center">
                    <span class="font-label-sm uppercase text-on-surface/50">Personas</span>
                    <span class="font-headline-md text-headline-md text-on-surface" id="metric-people">0</span>
                </div>
                <div class="glass-card p-6 flex flex-col items-center justify-center text-center">
                    <span class="font-label-sm uppercase text-on-surface/50">Estado</span>
                    <span class="font-headline-md text-headline-md text-green-500" id="metric-status">OK</span>
                </div>
                <div class="glass-card p-6 flex flex-col items-center justify-center text-center">
                    <span class="font-label-sm uppercase text-on-surface/50">Modelo</span>
                    <span class="font-headline-md text-headline-md text-on-surface font-mono" id="metric-model">—</span>
                </div>
            </section>
            <section id="class-metrics" class="col-span-12 grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-stack-lg"></section>
        </div>
    </main>
    <footer class="w-full py-8 border-t border-outline-variant bg-surface-container-lowest">
        <div class="flex flex-col md:flex-row justify-between items-center px-grid-margin w-full gap-4">
            <div class="flex flex-col md:flex-row items-center gap-4">
                <span class="font-label-md text-label-md font-bold text-primary flex items-center gap-2">
                    <span class="material-symbols-outlined text-sm">videocam</span> {{SITE_TITLE}}
                </span>
                <p class="font-label-sm text-label-sm text-on-surface-variant">© 2024 Barrios D. Todos los derechos reservados.</p>
            </div>
        </div>
    </footer>
    <script src="static/js/stream.js"></script>
</body>
</html>
