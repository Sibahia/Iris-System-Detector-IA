<!DOCTYPE html>
<html class="dark" lang="es" style="">

<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>VideoAI - Analysis</title>
    <link rel="stylesheet" href="static/css/video.css">
    <link href="/static/fonts/fonts.css" rel="stylesheet">
</head>

<body
    class="min-h-screen flex flex-col font-body-md overflow-x-hidden selection:bg-primary-container selection:text-on-primary-container relative">

    <header
            class="fixed top-0 w-full h-20 bg-white/4 backdrop-blur-[20px] border-b border-white/10 z-50 flex justify-between items-center px-grid-margin shadow-2xl">
            <div class="flex items-center gap-2">
                <span class="material-symbols-outlined text-primary text-3xl">videocam</span>
                <h1 class="font-headline-md text-headline-md font-bold text-primary">VideoAI</h1>
            </div>
            <div class="flex items-center gap-6">
                <nav class="hidden md:flex gap-8">


                </nav>
                <a class="bg-primary-container text-on-primary-container font-label-md text-label-md px-8 py-2.5 rounded-full font-bold active:scale-95 duration-200 orange-glow flex items-center gap-2"
                    href="/">
                    <span class="material-symbols-outlined text-sm">home</span>
                    Inicio
                </a>
            </div>
        </header>

    <main
        class="flex-grow flex flex-col items-center pt-24 pb-32 md:pt-32 px-4 md:px-grid-margin max-w-[1600px] mx-auto w-full z-10 gap-stack-xl">
        <div class="text-center w-full max-w-2xl mx-auto space-y-stack-sm">
            <h1
                class="font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg text-on-surface tracking-tight">
                Subir Video para Análisis</h1>
            <p class="font-body-md text-body-md text-on-surface-variant">Soporta MP4, AVI, MOV. Optimizado para
                detección de anomalías.</p>
        </div>

        <div
            class="glass-panel rounded-2xl p-card-padding w-full max-w-3xl flex flex-col items-center gap-stack-lg glass-panel-hover transition-all duration-300">
            <input type="file" id="videoFile" class="hidden" accept="video/*" onchange="updateFileName(this)"
                onclick="this.value = null;" autocomplete="off">
            <div onclick="document.getElementById('videoFile').click()"
                class="w-full border-2 border-dashed border-white/20 rounded-xl p-stack-xl flex flex-col items-center justify-center gap-stack-md bg-surface-container/30 hover:bg-surface-container/50 hover:border-primary-container/50 transition-colors cursor-pointer group">
                <div
                    class="w-16 h-16 rounded-full bg-surface-variant flex items-center justify-center group-hover:scale-110 transition-transform">
                    <span class="material-symbols-outlined text-3xl text-primary-container">folder_open</span>
                </div>
                <span id="fileName"
                    class="font-label-md text-label-md text-primary-fixed-dim tracking-wider uppercase">Haz clic para
                    buscar o arrastra el video</span>
            </div>

            <div class="w-full flex flex-col md:flex-row justify-center items-center gap-stack-lg">
                <div class="flex flex-col gap-2 w-full md:w-64">
                    <label class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider">Umbral
                        de Multitud</label>
                    <select id="crowdThreshold"
                        class="w-full bg-surface-container border border-white/10 rounded-lg px-4 py-3 font-body-md text-on-surface focus:ring-0 focus:outline-none appearance-none cursor-pointer">
                        <option value="2">2+ personas</option>
                        <option value="3">3+ personas</option>
                        <option value="5">5+ personas</option>
                    </select>
                </div>
            </div>

            <button onclick="uploadVideo()"
                class="bg-primary-container text-on-primary-container font-label-md text-label-md px-8 py-4 rounded-lg hover:bg-primary transition-colors flex items-center gap-2 mt-4 shadow-lg shadow-primary-container/20">
                <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">play_arrow</span>
                Iniciar Análisis
            </button>
        </div>

        <div id="loading" class="w-full max-w-3xl" style="display: none;">
            <div class="w-full bg-surface-variant h-2 rounded-full overflow-hidden">
                <div id="progressBar" class="bg-primary-container h-full w-[0%] transition-all duration-500"></div>
            </div>
            <p id="progressText" class="text-center text-sm mt-2 text-on-surface-variant">0%</p>
        </div>

        <div id="results" class="w-full space-y-stack-lg" style="display: none;">
    <h2 class="font-headline-md text-headline-md text-on-surface">Resultados del Análisis</h2>
    
    <div id="metrics" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-grid-gutter w-full"></div>
    
    <div id="video-container"
        class="glass-panel rounded-2xl overflow-hidden relative w-full aspect-video border border-white/10 shadow-2xl">
        <video id="annotated-video" controls class="w-full h-full"></video>
    </div>
</div>
    </main>

    <script src="static/js/video.js"></script>
</body>

</html>
