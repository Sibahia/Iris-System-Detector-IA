name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "feature/*" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.14.4
      uses: actions/setup-python@v5
      with:
        python-version: "3.14.4"
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install -r requirements-test.txt
        pip install flake8
    - name: Lint with flake8
      run: |
        flake8 app.py src/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics
    - name: Test with pytest
      env:
        PYTHONPATH: .
      run: |
        pytest tests/

  build-and-push:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Build Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        load: true
        tags: iris-system-detector-ia:latest
    - name: Push to GHCR
      run: |
        docker tag iris-system-detector-ia:latest ghcr.io/${{ github.repository_owner }}/iris-system-detector-ia:latest
        docker push ghcr.io/${{ github.repository_owner }}/iris-system-detector-ia:latest
