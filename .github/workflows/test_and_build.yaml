name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "feature/*" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.14.4
      uses: actions/setup-python@v5
      with:
        python-version: "3.14.4"
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install -r requirements-test.txt
        pip install flake8
    - name: Lint with flake8
      run: |
        flake8 app.py src/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics
    - name: Test with pytest
      env:
        PYTHONPATH: .
      run: |
        pytest tests/

  build-and-artifact:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    - name: Build Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        load: true
        tags: cctv-anomaly-detection:latest
    - name: Save Docker image as artifact
      run: |
        docker save cctv-anomaly-detection:latest | gzip > cctv-image.tar.gz
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: docker-image
        path: cctv-image.tar.gz
        retention-days: 30
